<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --surface2: #141a22;
    --surface3: #1a2230;
    --border: #1f2d3d;
    --border2: #243040;
    --red: #e5383b;
    --red-dim: #8b1a1c;
    --red-glow: rgba(229,56,59,0.15);
    --amber: #f59e0b;
    --green: #22c55e;
    --cyan: #06b6d4;
    --text: #e2e8f0;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'Outfit', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.6;
    overflow-x: hidden;
  }
  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    pointer-events: none;
    z-index: 9999;
  }
  .mono { font-family: var(--mono); }
  .sans { font-family: var(--sans); }
  /* Custom scrollbars */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--red-dim); }

  .btn-red {
    background: var(--red);
    color: #fff;
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 18px;
    text-transform: uppercase;
    border: 1px solid var(--red);
    transition: all .15s;
    cursor: pointer;
  }
  .btn-red:hover { background: #ff4548; box-shadow: 0 0 12px rgba(229,56,59,.4); }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 2px;
    padding: 10px 18px;
    text-transform: uppercase;
    border: 1px solid var(--border2);
    transition: all .15s;
    cursor: pointer;
  }
  .btn-ghost:hover { color: var(--text); border-color: var(--red-dim); }
  .field-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
    display: block;
  }
  .field-input, .field-select, .field-textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 2px;
    outline: none;
    transition: border-color .15s;
  }
  .field-input:focus, .field-select:focus, .field-textarea:focus {
    border-color: var(--red);
    box-shadow: 0 0 0 1px var(--red);
  }
  .field-textarea { min-height: 90px; resize: vertical; font-family: var(--mono); font-size: 13px; }
  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
  .card-hover:hover { border-color: var(--red-dim); background: var(--surface3); cursor: pointer; }
  .pill {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    display: inline-block;
  }
  .pill-red { background: rgba(229,56,59,.15); color: var(--red); border: 1px solid rgba(229,56,59,.3); }
  .pill-amber { background: rgba(245,158,11,.12); color: var(--amber); border: 1px solid rgba(245,158,11,.3); }
  .pill-green { background: rgba(34,197,94,.10); color: var(--green); border: 1px solid rgba(34,197,94,.3); }
  .pill-cyan { background: rgba(6,182,212,.10); color: var(--cyan); border: 1px solid rgba(6,182,212,.3); }
  .pill-gray { background: rgba(100,116,139,.10); color: var(--text-dim); border: 1px solid var(--border2); }
  .glow-pulse {
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: .55; }
  }
  .blink::after {
    content: '_';
    animation: blink 1s steps(2) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }
  .grid-bg {
    background-image:
      linear-gradient(rgba(229,56,59,.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(229,56,59,.04) 1px, transparent 1px);
    background-size: 32px 32px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 22px;
    font-size: 13px;
    color: var(--text-dim);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
    text-decoration: none;
  }
  .nav-item:hover {
    color: var(--text);
    background: rgba(229,56,59,.05);
    border-left-color: var(--red-dim);
  }
  .nav-item.active {
    color: var(--red);
    background: var(--red-glow);
    border-left-color: var(--red);
  }
  .nav-num {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    min-width: 22px;
  }
  .table-row { border-bottom: 1px solid var(--border); }
  .table-row:hover { background: var(--surface3); cursor: pointer; }
  .severity-bar {
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    display: flex;
  }
  .severity-bar > div { height: 100%; }

  .kanban-card {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-left: 3px solid var(--red-dim);
    padding: 12px;
    border-radius: 3px;
    margin-bottom: 10px;
    cursor: grab;
    transition: all .15s;
  }
  .kanban-card:hover { border-color: var(--red); transform: translateY(-1px); }

  .timeline-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
  }
  .timeline-line {
    width: 1px;
    background: var(--border2);
    flex: 1;
    margin: 4px 0;
  }
  .heading-eyebrow {
    display: flex; align-items: center; gap: 12px;
    font-family: var(--mono); font-size: 11px; color: var(--red);
    letter-spacing: 3px; text-transform: uppercase;
  }
  .heading-eyebrow::before {
    content: ''; width: 36px; height: 1px; background: var(--red);
  }
  .stat-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 18px 20px;
    border-radius: 3px;
  }
</style>

    );
  }

  return (
    <div style={{padding:'40px 48px', maxWidth:1280}}>
      <div className="heading-eyebrow">/ DELIVERY</div>
      <div className="flex items-end justify-between mt-3">
        <h1 style={{fontSize:34, fontWeight:900, letterSpacing:-1.2}}>Reports & <span style={{color:'var(--red)'}}>Delivery</span></h1>
        <button onClick={()=>setView('builder')} className="btn-red flex items-center gap-2"><Icon name="plus" size={14}/> START NEW REPORT</button>
      </div>
      <div className="card mt-6">
        <div className="grid grid-cols-12 mono" style={{fontSize:10, color:'var(--text-muted)', letterSpacing:1.5, padding:'12px 18px', borderBottom:'1px solid var(--border)'}}>
          <div className="col-span-1">ID</div>
          <div className="col-span-5">NAME</div>
          <div className="col-span-2">STATUS</div>
          <div className="col-span-2">AUTHOR</div>
          <div className="col-span-1 text-right">FINDINGS</div>
          <div className="col-span-1 text-right">UPDATED</div>
        </div>
        {reports.map(r=>(
          <div key={r.id} className="table-row grid grid-cols-12 items-center" style={{padding:'14px 18px'}}>
            <div className="col-span-1 mono" style={{fontSize:11, color:'var(--text-muted)'}}>{r.id}</div>
            <div className="col-span-5">{r.name}</div>
            <div className="col-span-2"><span className={`pill ${statusColor(r.status)}`}>{r.status}</span></div>
            <div className="col-span-2 mono" style={{fontSize:12, color:'var(--text-dim)'}}>@{r.author}</div>
            <div className="col-span-1 text-right">{r.findings}</div>
            <div className="col-span-1 text-right mono" style={{fontSize:10, color:'var(--text-muted)'}}>{r.updated}</div>
          </div>
        ))}
      </div>
    </div>
  );
};

// ====================== TEAM ======================
const Team = ({ team }) => (
  <div style={{padding:'40px 48px', maxWidth:1280}}>
    <div className="heading-eyebrow">/ ORGANIZATION</div>
    <div className="flex items-end justify-between mt-3">
      <h1 style={{fontSize:34, fontWeight:900, letterSpacing:-1.2}}>Team & <span style={{color:'var(--red)'}}>Roles</span></h1>
      <button className="btn-red flex items-center gap-2"><Icon name="plus" size={14}/> INVITE OPERATOR</button>
    </div>
    <p style={{color:'var(--text-dim)', marginTop:6, maxWidth:680}}>
      Roles are scoped per engagement (SRS §3.1). Platform admins cannot view engagement content by design — separation of duties is enforced at the API layer.
    </p>

    <div className="card mt-6">
      <div className="grid grid-cols-12 mono" style={{fontSize:10, color:'var(--text-muted)', letterSpacing:1.5, padding:'12px 18px', borderBottom:'1px solid var(--border)'}}>
        <div className="col-span-3">OPERATOR</div>
        <div className="col-span-3">ROLE</div>
        <div className="col-span-2">ENGAGEMENTS</div>
        <div className="col-span-2">PRESENCE</div>
        <div className="col-span-2 text-right">LAST SEEN</div>
      </div>
      {team.map(t => (
        <div key={t.user} className="table-row grid grid-cols-12 items-center" style={{padding:'14px 18px'}}>
          <div className="col-span-3">
            <div style={{fontWeight:600}}>{t.name}</div>
            <div className="mono" style={{fontSize:11, color:'var(--text-muted)'}}>@{t.user}</div>
          </div>
          <div className="col-span-3"><span className={`pill ${t.role.includes('LEAD')||t.role.includes('ADMIN')?'pill-red':t.role.includes('SENIOR')?'pill-amber':t.role.includes('CLIENT')?'pill-cyan':'pill-gray'}`}>{t.role}</span></div>
          <div className="col-span-2 mono" style={{fontSize:13}}>{t.engagements}</div>
          <div className="col-span-2 mono" style={{fontSize:11}}>
            <span style={{color: t.status==='online'?'var(--green)':t.status==='idle'?'var(--amber)':'var(--text-muted)'}}>● </span>
            <span style={{color:'var(--text-dim)'}}>{t.status}</span>
          </div>
          <div className="col-span-2 text-right mono" style={{fontSize:11, color:'var(--text-muted)'}}>{t.last}</div>
        </div>
      ))}
    </div>
  </div>
);

// ====================== SETTINGS ======================
const Settings = () => (
  <div style={{padding:'40px 48px', maxWidth:980}}>
    <div className="heading-eyebrow">/ SYSTEM</div>
    <h1 style={{fontSize:34, fontWeight:900, letterSpacing:-1.2, marginTop:6}}>Settings</h1>
    <p style={{color:'var(--text-dim)', marginTop:6}}>Platform-level configuration. Changes are audited per SRS §7.3.</p>

    <div className="grid grid-cols-2 gap-3 mt-7">
      <div className="card p-5">
        <div className="mono" style={{fontSize:11, color:'var(--cyan)', letterSpacing:2}}>// AUTHENTICATION</div>
        <label className="flex items-center justify-between mt-4">
          <span style={{fontSize:13}}>Require 2FA for all operators</span>
          <input type="checkbox" defaultChecked />
        </label>
        <label className="flex items-center justify-between mt-3">
          <span style={{fontSize:13}}>Allow WebAuthn / hardware keys</span>
          <input type="checkbox" defaultChecked />
        </label>
        <label className="flex items-center justify-between mt-3">
          <span style={{fontSize:13}}>Session idle timeout</span>
          <select className="field-select" style={{width:120}}><option>15 min</option><option>30 min</option><option>1 hour</option></select>
        </label>
      </div>
      <div className="card p-5">
        <div className="mono" style={{fontSize:11, color:'var(--cyan)', letterSpacing:2}}>// DATA & ENCRYPTION</div>
        <label className="flex items-center justify-between mt-4">
          <span style={{fontSize:13}}>Encrypt evidence at rest (AES-256)</span>
          <input type="checkbox" defaultChecked disabled />
        </label>
        <label className="flex items-center justify-between mt-3">
          <span style={{fontSize:13}}>Auto-archive engagements after</span>
          <select className="field-select" style={{width:120}}><option>30 days</option><option>90 days</option><option>180 days</option></select>
        </label>
        <label className="flex items-center justify-between mt-3">
          <span style={{fontSize:13}}>Daily backups (off-site)</span>
          <input type="checkbox" defaultChecked />
        </label>
      </div>
      <div className="card p-5 col-span-2">
        <div className="mono" style={{fontSize:11, color:'var(--cyan)', letterSpacing:2}}>// INTEGRATIONS</div>
        <div className="grid grid-cols-4 gap-2 mt-4">
          {['Burp Suite','Nmap / Masscan','MITRE ATT&CK','Slack','Jira','GitHub','Vault','Okta SSO'].map(s=>(
            <div key={s} className="card p-3" style={{textAlign:'center'}}>
              <div className="mono" style={{fontSize:11}}>{s}</div>
              <span className="pill pill-green mt-2 inline-block">CONNECTED</span>
            </div>
          ))}
        </div>
      </div>
      <div className="card p-5 col-span-2" style={{borderColor:'var(--red-dim)'}}>
        <div className="mono" style={{fontSize:11, color:'var(--red)', letterSpacing:2}}>// DANGER ZONE</div>
        <div className="flex items-center justify-between mt-4">
          <div>
            <div style={{fontSize:13}}>Rotate platform encryption keys</div>
            <div style={{fontSize:11, color:'var(--text-muted)'}}>Forces re-encryption of all evidence stores. ~12h on current dataset.</div>
          </div>
          <button className="btn-ghost" style={{borderColor:'var(--red-dim)', color:'var(--red)'}}>ROTATE KEYS</button>
        </div>
      </div>
    </div>
  </div>
);

// ====================== APP ROOT ======================
const App = () => {
  const [authed, setAuthed] = useState(false);
  const [page, setPage] = useState('dashboard');
  const [activeEng, setActiveEng] = useState(null);
  const [findings, setFindings] = useState(seedFindings);
  const [tasks, setTasks] = useState(seedTasks);
  const [openFindingId, setOpenFindingId] = useState(null);
  const [toast, setToast] = useState(null);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null), 2500); };

  // Filter findings/tasks to active engagement scope
  const engFindings = useMemo(()=> activeEng ? findings.filter(f=>f.engId===activeEng.id) : [], [findings, activeEng]);
  const engTasks    = useMemo(()=> activeEng ? tasks.filter(t=>t.engId===activeEng.id) : [], [tasks, activeEng]);
  const engTargets  = useMemo(()=> activeEng ? seedTargets.filter(t=>t.engId===activeEng.id) : [], [activeEng]);
  const engReports  = useMemo(()=> activeEng ? seedReports.filter(r=>r.engId===activeEng.id) : seedReports, [activeEng]);

  const openFinding = (id) => { setOpenFindingId(id); setPage('finding-detail'); };
  const startNew = () => { setPage('finding-new'); };

  const saveFinding = (form) => {
    const id = `F-${activeEng.id.slice(-3)}-${String(engFindings.length + 1).padStart(3,'0')}`;
    const newF = {
      id, engId: activeEng.id, title: form.title || 'Untitled finding',
      severity: form.severity, cvss: parseFloat(form.cvss)||5.0,
      status: 'DRAFT', owner: form.owner, target: form.target || 'unknown',
      tags: form.tags.split(',').map(s=>s.trim()).filter(Boolean), updated: 'just now',
    };
    setFindings(f => [newF, ...f]);
    showToast(`✓ Finding ${id} saved as DRAFT`);
    setPage('findings');
  };

  const addTaskFromFinding = (finding) => {
    const id = `TK-${String(tasks.length + 1).padStart(3,'0')}`;
    setTasks(ts => [{
      id, engId: finding.engId,
      title: `Follow up on ${finding.id} — ${finding.title.slice(0,40)}…`,
      col: 'TODO', owner: finding.owner, findingId: finding.id, priority:'HIGH',
    }, ...ts]);
    showToast(`✓ Task ${id} created and assigned to @${finding.owner}`);
    setPage('tasks');
  };

  const breadcrumbFor = () => {
    const parts = ['REDOPS_'];
    if (activeEng) parts.push(activeEng.id);
    parts.push(({
      dashboard:'DASHBOARD', engagement:'OVERVIEW', targets:'TARGETS',
      findings:'FINDINGS', 'finding-detail':'FINDING', 'finding-new':'NEW_FINDING',
      tasks:'TASKS', reports:'REPORTS', team:'TEAM', settings:'SETTINGS',
    })[page] || page.toUpperCase());
    return parts.join(' / ');
  };

  const titleFor = () => ({
    dashboard:'Operations Dashboard',
    engagement: activeEng ? activeEng.client : 'Engagement',
    targets:'Targets & Recon',
    findings:'Findings',
    'finding-detail': openFindingId || 'Finding',
    'finding-new':'New Finding',
    tasks:'Tasks Board',
    reports:'Reports',
    team:'Team',
    settings:'Settings',
  })[page] || page;

  if (!authed) return <Login onLogin={()=>{ setAuthed(true); setPage('dashboard'); showToast('✓ Authenticated · session r.chen'); }} />;

  const openFinding_ = engFindings.find(f=>f.id===openFindingId);

  let content;
  switch (page) {
    case 'dashboard': content = <Dashboard engagements={seedEngagements} setActiveEng={setActiveEng} setPage={setPage} />; break;
    case 'engagement': content = activeEng ? <EngagementOverview eng={activeEng} findings={engFindings} tasks={engTasks} setPage={setPage}/> : null; break;
    case 'targets': content = <Targets targets={engTargets} />; break;
    case 'findings': content = <Findings findings={engFindings} setPage={setPage} openFinding={openFinding} startNewFinding={startNew} />; break;
    case 'finding-detail': content = openFinding_ ? <FindingDetail finding={openFinding_} back={()=>setPage('findings')} addTask={addTaskFromFinding} /> : null; break;
    case 'finding-new': content = <NewFinding save={saveFinding} cancel={()=>setPage('findings')} />; break;
    case 'tasks': content = <Tasks tasks={engTasks} setTasks={setTasks} />; break;
    case 'reports': content = activeEng ? <Reports reports={engReports} eng={activeEng} findings={engFindings} /> : null; break;
    case 'team': content = <Team team={seedTeam} />; break;
    case 'settings': content = <Settings />; break;
    default: content = <div style={{padding:40}}>Page not found.</div>;
  }

  return (
    <div className="flex">
      <Sidebar page={page} setPage={setPage} activeEng={activeEng} setActiveEng={setActiveEng} logout={()=>setAuthed(false)} />
      <main className="flex-1 min-h-screen" style={{background:'var(--bg)'}}>
        <TopBar title={titleFor()} breadcrumb={breadcrumbFor()} />
        {content}
      </main>
      {toast && (
        <div style={{
          position:'fixed', bottom:24, right:24, zIndex:1000,
          background:'var(--surface3)', border:'1px solid var(--red)',
          color:'var(--text)', padding:'12px 20px', borderRadius:3,
          boxShadow:'0 0 24px rgba(229,56,59,.3)',
        }} className="mono">
          {toast}
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
