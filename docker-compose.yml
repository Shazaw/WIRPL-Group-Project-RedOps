services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: redops
      POSTGRES_USER: redops
      POSTGRES_PASSWORD: redops_dev_password
    ports:
      - "5432:5432"
    volumes:
      - redops-postgres:/var/lib/postgresql/data
      - ./infra/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redops -d redops"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redops-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: redopsminio
      MINIO_ROOT_PASSWORD: redopsminio_dev_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - redops-minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redops-postgres:
  redops-redis:
  redops-minio:
